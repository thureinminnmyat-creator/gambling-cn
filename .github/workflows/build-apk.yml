name: Build Android APK

on:
  push:
    branches:
      - main 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install NPM Dependencies
        run: npm install

      - name: Build React App
        run: npm run build

      - name: Force Setup Capacitor & Android
        run: |
          npm install @capacitor/core @capacitor/android @capacitor/cli
          rm -f capacitor.config.json capacitor.config.ts
          npx cap init "Dice Casino" "com.dice.casino" --web-dir dist
          npx cap add android || echo "Android folder exists"
          npx cap sync android
          
          # 🚨 မင်းတင်လိုက်တဲ့ icon.png ကိုယူပြီး App Icon အဖြစ် အလိုလို ပြောင်းပေးမည့်စနစ် 🚨
          npm install -D @capacitor/assets
          npx @capacitor/assets generate --android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Make Gradle Executable
        run: chmod +x ./android/gradlew

      - name: Build Android APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK File
        uses: actions/upload-artifact@v4
        with:
          name: Dice-Casino-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
